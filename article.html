<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>{title}</title>
        <style>
            body {{ max-width: 700px; margin: 40px auto; font-family: Georgia, serif;
                   font-size: 1.1em; line-height: 1.7; color: #222; padding: 0 1em; }}
            h1 {{ font-size: 1.8em; line-height: 1.3; }}
            img {{ max-width: 100%; }}
            .original-url {{ font-size: 0.85em; margin-bottom: 1.5em; }}
            .original-url a {{ color: #666; }}
        </style>
    </head>
    <body>
        <h1>{title}</h1>
        <p class="original-url"><a href="{url}">Original URL</a></p>
        {content}
    </body>
</html>
