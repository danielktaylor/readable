<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Readable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      background: #f5f2eb;
      color: #222;
      padding: 2rem;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 600px;
    }

    input[type="url"] {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #222;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="url"]:focus {
      border-color: #555;
    }

    button {
      padding: 0.75rem 1.4rem;
      font-size: 1rem;
      font-family: inherit;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <form method="get" action="/fetch">
    <input
      type="url"
      name="url"
      placeholder="https://example.com/article"
      required
      autofocus
    >
    <button type="submit">Read</button>
  </form>
</body>
</html>
